<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>trading-bot 종목 등록</title>
<style>
  :root {
    --bg: #0f1115;
    --panel: #171920;
    --panel-2: #1e2129;
    --hover: #262a34;
    --border: #262932;
    --text: #eaecef;
    --muted: #8b8f9b;
    --faint: #6b6f7a;
    --blue: #3182f6;
    --up: #f0616d;
    --down: #4c8dff;
    --green: #2ac1a0;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font-family: -apple-system, "Apple SD Gothic Neo", "Pretendard", "Malgun Gothic", sans-serif;
    font-size: 14px; -webkit-font-smoothing: antialiased;
  }
  header {
    padding: 14px 28px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 12px; position: sticky; top: 0;
    background: rgba(15,17,21,.85); backdrop-filter: blur(8px); z-index: 50;
  }
  header .logo { font-weight: 800; font-size: 17px; letter-spacing: -.3px; }
  header .tag { color: var(--muted); font-size: 12px; }
  header .spacer { flex: 1; }
  header .stat { color: var(--muted); font-size: 13px; }
  header .stat b { color: var(--text); }

  .indexbar {
    display: flex; gap: 28px; flex-wrap: wrap; align-items: center;
    padding: 13px 28px; border-bottom: 1px solid var(--border); background: var(--panel);
  }
  .ix { display: flex; align-items: baseline; gap: 9px; }
  .ix .ixn { color: var(--muted); font-size: 13px; }
  .ix .ixv { font-weight: 700; font-size: 15px; font-variant-numeric: tabular-nums; }
  .ix .ixc { font-size: 12px; font-variant-numeric: tabular-nums; color: var(--faint); }
  .ix .ixc.chg-up { color: var(--up); }
  .ix .ixc.chg-down { color: var(--down); }

  .wrap {
    display: grid; grid-template-columns: 360px 1fr 300px; gap: 18px;
    padding: 22px 28px; max-width: 1500px; margin: 0 auto; align-items: start;
  }
  @media (max-width: 1200px) { .wrap { grid-template-columns: 340px 1fr; } .side { display: none; } }

  .panel { background: var(--panel); border: 1px solid var(--border); border-radius: 16px; }
  .panel-pad { padding: 20px; }
  .panel h2 { margin: 0 0 4px; font-size: 16px; letter-spacing: -.2px; }
  .panel .sub { color: var(--faint); font-size: 12px; margin-bottom: 16px; }

  label { display: block; font-size: 12px; color: var(--muted); margin: 14px 0 7px; font-weight: 600; }
  input[type=text] {
    width: 100%; padding: 12px 13px; background: var(--panel-2);
    border: 1px solid var(--border); border-radius: 11px; color: var(--text); font-size: 14px;
  }
  input[type=text]::placeholder { color: var(--faint); }
  input[type=text]:focus { outline: none; border-color: var(--blue); background: #1b1f29; }

  .search-box { position: relative; }
  .dropdown {
    position: absolute; top: 46px; left: 0; right: 0; z-index: 30;
    background: var(--panel-2); border: 1px solid var(--border); border-radius: 12px;
    overflow: hidden; max-height: 300px; overflow-y: auto; box-shadow: 0 12px 30px rgba(0,0,0,.4);
  }
  .dd-item { padding: 11px 13px; cursor: pointer; display: flex; align-items: center; gap: 10px; }
  .dd-item:hover { background: var(--hover); }
  .dd-item.on { background: #1b2535; }
  .dd-item .ck {
    width: 17px; height: 17px; flex: 0 0 17px; border-radius: 5px; border: 1.5px solid #3a4150;
    display: inline-flex; align-items: center; justify-content: center; font-size: 12px; color: #fff;
  }
  .dd-item.on .ck { background: var(--blue); border-color: var(--blue); }
  .dd-item .nm { font-weight: 500; flex: 1; }
  .dd-item .code { color: var(--faint); font-size: 12px; font-variant-numeric: tabular-nums; }
  .dd-foot {
    display: flex; justify-content: space-between; align-items: center; padding: 10px 13px;
    border-top: 1px solid var(--border); color: var(--muted); font-size: 12px;
    position: sticky; bottom: 0; background: var(--panel-2);
  }
  .dd-foot b { color: var(--text); }
  .dd-foot button {
    background: var(--blue); color: #fff; border: none; border-radius: 7px;
    padding: 6px 14px; font-size: 12px; font-weight: 600; cursor: pointer;
  }

  .chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; min-height: 8px; }
  .chip {
    background: #1d2735; color: #bcd2ff;
    border: 1px solid #314563; border-radius: 999px; padding: 7px 8px 7px 12px;
    font-size: 13px; display: flex; gap: 7px; align-items: center;
  }
  .chip .code { color: #7f96c2; font-size: 11px; }
  .chip button { background: none; border: none; color: #8aa3d4; cursor: pointer; font-size: 15px; line-height: 1; padding: 0; }
  .chip button:hover { color: #fff; }

  button.primary {
    width: 100%; margin-top: 18px; padding: 13px; background: var(--blue);
    color: #fff; border: none; border-radius: 12px; font-size: 15px; font-weight: 700; cursor: pointer;
    transition: filter .12s;
  }
  button.primary:hover { filter: brightness(1.08); }
  button.primary:disabled { background: #20283a; color: #5b6678; cursor: not-allowed; filter: none; }
  .msg { margin-top: 13px; font-size: 13px; min-height: 18px; }
  .msg.ok { color: var(--green); }
  .msg.err { color: var(--up); }

  /* 현황 */
  .status-head { display: flex; align-items: center; justify-content: space-between; padding: 20px 20px 6px; }
  .status-head h2 { margin: 0; font-size: 16px; }
  .refresh { background: none; border: 1px solid var(--border); color: var(--muted); border-radius: 8px; padding: 6px 11px; cursor: pointer; font-size: 12px; }
  .refresh:hover { background: var(--hover); color: var(--text); }

  .sector-block { padding: 6px 8px 4px; }
  .sector-title {
    display: flex; align-items: center; gap: 9px; padding: 12px 12px 8px;
  }
  .sector-title .name { font-weight: 700; font-size: 14px; }
  .sector-title .cnt { color: var(--faint); font-size: 12px; }
  .sector-title .bestbadge {
    margin-left: auto; font-size: 11px; color: #ffd479; background: #2c2718;
    border: 1px solid #4a3f1d; border-radius: 6px; padding: 2px 7px;
  }

  table { width: 100%; border-collapse: collapse; }
  th { color: var(--muted); font-size: 11px; font-weight: 600; text-align: right; padding: 6px 12px; }
  th.l { text-align: left; }
  td { padding: 11px 12px; border-top: 1px solid var(--border); font-size: 14px; }
  tr.row:hover td { background: var(--panel-2); }
  td.rank { color: var(--faint); width: 30px; font-variant-numeric: tabular-nums; }
  td.nm { font-weight: 600; }
  td.code { color: var(--faint); font-size: 12px; font-variant-numeric: tabular-nums; }
  td.r { text-align: right; font-variant-numeric: tabular-nums; }
  td.chg-na { color: var(--faint); }
  td.chg-up { color: var(--up); font-weight: 600; }
  td.chg-down { color: var(--down); font-weight: 600; }
  td.del-cell { text-align: right; width: 34px; }
  .del { background: none; border: none; color: var(--faint); cursor: pointer; font-size: 17px; line-height: 1; padding: 2px 7px; border-radius: 6px; }
  .del:hover { color: var(--up); background: #2a1e22; }
  .sector-del { margin-left: auto; background: none; border: 1px solid var(--border); color: var(--faint); border-radius: 7px; padding: 3px 10px; font-size: 11px; cursor: pointer; }
  .sector-del:hover { color: var(--up); border-color: #5a3138; }
  .avatar {
    display: inline-flex; align-items: center; justify-content: center; width: 26px; height: 26px;
    border-radius: 50%; background: linear-gradient(135deg,#2a3140,#1c2230); color: #9fb4d8;
    font-size: 11px; font-weight: 700; margin-right: 9px; vertical-align: middle;
  }

  tr.row { cursor: pointer; }
  tr.row.open td { background: var(--panel-2); }
  td.nm .caret { color: var(--faint); font-size: 10px; margin-left: 6px; transition: transform .15s; display: inline-block; }
  tr.row.open td.nm .caret { transform: rotate(90deg); color: var(--blue); }

  tr.chart-row > td { padding: 0; border-top: none; background: var(--panel-2); }
  .chart-wrap { padding: 10px 14px 16px; }
  .chart-toggle { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .chart-toggle button {
    background: var(--panel); border: 1px solid var(--border); color: var(--muted);
    border-radius: 7px; padding: 4px 12px; font-size: 12px; cursor: pointer; font-weight: 600;
  }
  .chart-toggle button.on { background: var(--blue); border-color: var(--blue); color: #fff; }
  .chart-toggle .ct-title { margin-left: auto; color: var(--faint); font-size: 11px; font-variant-numeric: tabular-nums; }
  .chart-canvas { width: 100%; height: 200px; display: block; }
  .chart-msg { color: var(--faint); font-size: 12px; padding: 24px 0; text-align: center; }

  td.spark-cell { width: 132px; padding: 4px 12px; }
  canvas.spark { width: 120px; height: 38px; display: block; }

  .empty { color: var(--faint); padding: 48px 0; text-align: center; }
  .empty .big { font-size: 32px; margin-bottom: 10px; }

  /* 사이드 요약 */
  .side .panel-pad { padding: 18px; }
  .sumrow { display: flex; align-items: center; gap: 10px; padding: 9px 0; }
  .sumrow .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--blue); }
  .sumrow .nm { font-size: 13px; }
  .sumrow .cnt { margin-left: auto; color: var(--muted); font-size: 13px; font-variant-numeric: tabular-nums; }
  .bar { height: 6px; background: var(--panel-2); border-radius: 4px; margin-top: 4px; overflow: hidden; }
  .bar > span { display: block; height: 100%; background: var(--blue); }
  .side h2 { font-size: 15px; margin: 0 0 14px; }
  .side .total { font-size: 28px; font-weight: 800; letter-spacing: -.5px; }
  .side .total small { font-size: 13px; color: var(--muted); font-weight: 500; margin-left: 4px; }
</style>
</head>
<body>
  <header>
    <span class="logo">📈 trading-bot</span>
    <span class="tag">종목 등록 · 로컬 전용</span>
    <span class="spacer"></span>
    <span class="stat">등록 <b id="hcount">0</b>종목 · <b id="hsectors">0</b>섹터</span>
  </header>

  <div class="indexbar" id="indexbar"></div>

  <div class="wrap">
    <!-- 등록 패널 -->
    <section class="panel panel-pad">
      <h2>종목 등록</h2>
      <div class="sub">섹터를 정하고 종목을 검색해 추가하세요</div>

      <label>섹터명</label>
      <input type="text" id="sector" placeholder="예: 반도체, 2차전지, 조선" />

      <label>종목 검색 (한글명 / 코드)</label>
      <div class="search-box">
        <input type="text" id="search" placeholder="삼성전자, 005930 …" autocomplete="off" />
        <div class="dropdown" id="dropdown" style="display:none"></div>
      </div>

      <div class="chips" id="chips"></div>

      <button class="primary" id="submit" disabled>등록</button>
      <div class="msg" id="msg"></div>
    </section>

    <!-- 현황 패널 -->
    <section class="panel">
      <div class="status-head">
        <h2>등록 현황</h2>
        <button class="refresh" id="refresh">↻ 새로고침</button>
      </div>
      <div id="picks"></div>
    </section>

    <!-- 사이드 요약 -->
    <aside class="side">
      <section class="panel panel-pad">
        <h2>요약</h2>
        <div class="total"><span id="stotal">0</span><small>종목</small></div>
        <div id="sectorbars" style="margin-top:16px"></div>
      </section>
    </aside>
  </div>

<script>
const $ = (id) => document.getElementById(id);
let selected = [];
let searchTimer = null;
const SECTOR_COLORS = ["#3182f6","#2ac1a0","#f0616d","#f5a623","#9b6cf0","#19b6c9","#e8639b"];

function renderChips() {
  $("chips").innerHTML = selected.map((s, i) =>
    `<span class="chip">${esc(s.name)} <span class="code">${s.code}</span>
       <button onclick="removeChip(${i})">×</button></span>`).join("");
  updateSubmit();
}
function removeChip(i){
  selected.splice(i,1); renderChips();
  if ($("dropdown").style.display === "block") renderDropdown();
}
function updateSubmit(){ $("submit").disabled = !($("sector").value.trim() && selected.length); }
function esc(s){ return (s||"").replace(/[<>&'"]/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;',"'":'&#39;','"':'&quot;'}[c])); }
function initial(name){ return (name||"?").trim().charAt(0); }

$("sector").addEventListener("input", updateSubmit);
$("search").addEventListener("input", (e) => {
  const q = e.target.value.trim();
  clearTimeout(searchTimer);
  if (!q){ $("dropdown").style.display="none"; return; }
  searchTimer = setTimeout(() => doSearch(q), 160);
});

let lastResults = [];
async function doSearch(q){
  try {
    const res = await fetch(`/api/search?q=${encodeURIComponent(q)}&limit=10`);
    lastResults = await res.json();
    renderDropdown();
  } catch { $("dropdown").style.display = "none"; }
}
function renderDropdown(){
  if (!lastResults.length){ $("dropdown").style.display="none"; return; }
  const rows = lastResults.map(it => {
    const on = selected.some(s => s.code === it.code);
    return `<div class="dd-item${on?' on':''}" onclick="toggleSelect('${it.code}','${esc(it.name)}')">
      <span class="ck">${on?'✓':''}</span>
      <span class="nm">${esc(it.name)}</span><span class="code">${it.code}</span></div>`;
  }).join("");
  $("dropdown").innerHTML = rows +
    `<div class="dd-foot"><span>선택 <b>${selected.length}</b>개</span>
       <button type="button" onclick="closeDropdown()">완료</button></div>`;
  $("dropdown").style.display = "block";
}
function toggleSelect(code, name){
  const i = selected.findIndex(s => s.code === code);
  if (i >= 0) selected.splice(i, 1); else selected.push({ code, name });
  renderChips();
  renderDropdown();
}
function closeDropdown(){ $("dropdown").style.display = "none"; }

$("submit").addEventListener("click", async () => {
  const sector = $("sector").value.trim();
  if (!sector || !selected.length) return;
  $("submit").disabled = true;
  $("msg").className = "msg"; $("msg").textContent = "등록 중…";
  try {
    const res = await fetch("/api/picks", {
      method: "POST", headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ sector_name: sector, stocks: selected }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || "등록 실패");
    $("msg").className = "msg ok";
    $("msg").textContent = `✅ [${sector}] ${data.added}종목 등록 (총 ${data.total}` +
      (data.skipped.length ? `, 중복 ${data.skipped.length}` : "") + ")";
    selected = []; renderChips();
    loadPicks();
  } catch (err) {
    $("msg").className = "msg err"; $("msg").textContent = "❌ " + err.message;
  } finally { updateSubmit(); }
});

$("refresh").addEventListener("click", () => { loadIndexBar(); loadPicks(); });

async function removeStock(sector, code){
  if (!confirm(`${code} 을(를) [${sector}]에서 제거할까요?`)) return;
  try {
    const res = await fetch("/api/picks/remove-stock", {
      method: "POST", headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ sector_name: sector, stock_code: code }),
    });
    if (!res.ok) { const d = await res.json(); throw new Error(d.detail || "제거 실패"); }
    loadPicks();
  } catch (e) { alert("❌ " + e.message); }
}

async function removeSector(sector){
  if (!confirm(`[${sector}] 섹터 전체를 제거할까요? (소속 종목 모두 삭제)`)) return;
  try {
    const res = await fetch("/api/picks/remove-sector", {
      method: "POST", headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ sector_name: sector }),
    });
    if (!res.ok) { const d = await res.json(); throw new Error(d.detail || "제거 실패"); }
    loadPicks();
  } catch (e) { alert("❌ " + e.message); }
}

async function loadPicks(){
  try {
    const res = await fetch("/api/picks");
    const picks = await res.json();
    // sector → [{name,code,pick_id,expires}]
    const bySector = {};
    let total = 0;
    for (const p of picks) for (const s of p.stocks) {
      (bySector[s.sector] = bySector[s.sector] || []).push({...s, pick_id: p.pick_id, expires: p.expires_at.slice(0,10)});
      total++;
    }
    const sectors = Object.keys(bySector);
    $("hcount").textContent = total;
    $("hsectors").textContent = sectors.length;
    $("stotal").textContent = total;

    if (!total) {
      $("picks").innerHTML = `<div class="empty"><div class="big">🗂️</div>아직 등록된 종목이 없습니다.<br>왼쪽에서 섹터와 종목을 추가해보세요.</div>`;
      $("sectorbars").innerHTML = `<div style="color:var(--faint);font-size:13px">—</div>`;
      return;
    }

    $("picks").innerHTML = sectors.map((sec, si) => {
      const items = bySector[sec];
      const rows = items.map((s, i) => `
        <tr class="row" onclick="toggleChart(this,'${s.code}','${esc(s.name)}')">
          <td class="rank">${i+1}</td>
          <td class="nm"><span class="avatar">${esc(initial(s.name))}</span>${esc(s.name)}<span class="caret">▶</span></td>
          <td class="r" data-q="price-${s.code}">—</td>
          <td class="r" data-q="value-${s.code}">—</td>
          <td class="r" data-q="vol-${s.code}">—</td>
          <td class="r chg-na" data-chg="${s.code}">—</td>
          <td class="spark-cell"><canvas class="spark" data-spark="${s.code}"></canvas></td>
          <td class="del-cell"><button class="del" title="제거" onclick="event.stopPropagation();removeStock('${esc(sec)}','${s.code}')">×</button></td>
        </tr>
        <tr class="chart-row" style="display:none"><td colspan="8"></td></tr>`).join("");
      return `
        <div class="sector-block">
          <div class="sector-title">
            <span class="dot" style="width:9px;height:9px;border-radius:50%;background:${SECTOR_COLORS[si%SECTOR_COLORS.length]}"></span>
            <span class="name">${esc(sec)}</span>
            <span class="cnt">${items.length}종목</span>
            <button class="sector-del" onclick="removeSector('${esc(sec)}')">섹터 삭제</button>
          </div>
          <table>
            <thead><tr>
              <th class="l" style="width:30px"></th><th class="l">종목</th>
              <th>현재가</th><th>거래대금</th><th>거래량</th><th>등락률</th><th class="l">차트</th><th></th>
            </tr></thead>
            <tbody>${rows}</tbody>
          </table>
        </div>`;
    }).join("");

    $("sectorbars").innerHTML = sectors.map((sec, si) => {
      const cnt = bySector[sec].length;
      const pct = Math.round(cnt / total * 100);
      const color = SECTOR_COLORS[si % SECTOR_COLORS.length];
      return `<div>
        <div class="sumrow"><span class="dot" style="background:${color}"></span>
          <span class="nm">${esc(sec)}</span><span class="cnt">${cnt}</span></div>
        <div class="bar"><span style="width:${pct}%;background:${color}"></span></div>
      </div>`;
    }).join("");

    const allCodes = [...new Set(picks.flatMap(p => p.stocks.map(s => s.code)))];
    fetchQuotes(allCodes);
    loadMiniCharts(allCodes);
  } catch {
    $("picks").innerHTML = `<div class="empty">현황을 불러오지 못했습니다.</div>`;
  }
}

function fmtPrice(p){ return p ? p.toLocaleString()+"원" : "—"; }
function fmtValue(v){ return v ? Math.round(v/1e8).toLocaleString()+"억" : "—"; }
function fmtVol(v){ return v ? Math.round(v/1e4).toLocaleString()+"만" : "—"; }
function setCell(sel, text){ document.querySelectorAll(sel).forEach(el => el.textContent = text); }

async function fetchQuotes(codes){
  if (!codes.length) return;
  try {
    const res = await fetch(`/api/quotes?codes=${codes.join(",")}`);
    const data = await res.json();
    codes.forEach(code => {
      const q = data[code];
      document.querySelectorAll(`td[data-chg="${code}"]`).forEach(el => {
        el.classList.remove("chg-na","chg-up","chg-down");
        if (!q) { el.textContent = "—"; el.classList.add("chg-na"); return; }
        const r = q.change_rate;
        el.textContent = (r > 0 ? "+" : "") + r.toFixed(2) + "%";
        el.classList.add(r > 0 ? "chg-up" : r < 0 ? "chg-down" : "chg-na");
      });
      setCell(`td[data-q="price-${code}"]`, q ? fmtPrice(q.price) : "—");
      setCell(`td[data-q="value-${code}"]`, q ? fmtValue(q.value) : "—");
      setCell(`td[data-q="vol-${code}"]`, q ? fmtVol(q.volume) : "—");
    });
  } catch {}
}

// 드롭다운 내부 클릭은 바깥-클릭-닫기에서 제외. (innerHTML 재생성으로 e.target이
// detach되면 closest 판정이 깨지므로, 컨테이너에서 전파를 끊어 오닫힘을 막는다.)
$("dropdown").addEventListener("click", (e) => e.stopPropagation());

// ----- 봉차트 -----
function getCSS(v){ return getComputedStyle(document.documentElement).getPropertyValue(v).trim() || "#888"; }

let dailyCache = {};  // code -> 일봉 candles (미니/펼침 차트 공용)

// 행별 가로 미니 일봉차트
async function loadMiniCharts(codes){
  if (!codes.length) return;
  try {
    const res = await fetch(`/api/candles-batch?codes=${codes.join(",")}&tf=daily`);
    const data = await res.json();
    const map = data.candles || {};
    codes.forEach(code => {
      dailyCache[code] = map[code] || [];
      document.querySelectorAll(`canvas.spark[data-spark="${code}"]`).forEach(cv => {
        if (dailyCache[code].length) drawMini(cv, dailyCache[code]);
      });
    });
  } catch {}
}

// 최신 일봉 1개를 가로로 누인 캔들: 꼬리(저가~고가) 선 + 시가~종가 각진 몸통
function drawMini(canvas, candles){
  if (!candles.length) return;
  const d = candles[candles.length - 1];
  const dpr = window.devicePixelRatio || 1;
  const cssW = canvas.clientWidth || 120, cssH = canvas.clientHeight || 38;
  canvas.width = cssW * dpr; canvas.height = cssH * dpr;
  const ctx = canvas.getContext("2d"); ctx.scale(dpr, dpr); ctx.clearRect(0, 0, cssW, cssH);

  const pad = 4, lo = d.l, range = (d.h - d.l) || 1;
  const x = (p) => pad + (p - lo) / range * (cssW - pad * 2);
  const cy = Math.round(cssH / 2) + 0.5;  // 0.5 보정으로 선 또렷하게
  const col = d.c >= d.o ? getCSS("--up") : getCSS("--down");

  // 꼬리: 저가~고가 가는 선 (몸통 밖으로 양끝 노출)
  ctx.strokeStyle = col; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(x(d.l), cy); ctx.lineTo(x(d.h), cy); ctx.stroke();

  // 몸통: 시가~종가 각진 사각형
  const bx1 = x(Math.min(d.o, d.c)), bx2 = x(Math.max(d.o, d.c));
  ctx.fillStyle = col;
  ctx.fillRect(Math.round(bx1), cy - 7, Math.max(Math.round(bx2 - bx1), 2), 14);
}

// 행 클릭 → 상세 차트 펼침

function toggleChart(rowEl, code, name){
  const chartRow = rowEl.nextElementSibling;
  if (!chartRow || !chartRow.classList.contains("chart-row")) return;
  if (chartRow.style.display !== "none"){
    chartRow.style.display = "none"; rowEl.classList.remove("open"); return;
  }
  rowEl.classList.add("open");
  chartRow.style.display = "";
  const td = chartRow.firstElementChild;
  if (td.dataset.built) return;
  td.dataset.built = "1";
  td.innerHTML = `
    <div class="chart-wrap">
      <div class="chart-toggle">
        <button class="on" data-tf="daily">일봉</button>
        <button data-tf="minute">분봉</button>
        <span class="ct-title">${esc(name)} · ${code}</span>
      </div>
      <canvas class="chart-canvas"></canvas>
      <div class="chart-msg" style="display:none"></div>
    </div>`;
  const btns = td.querySelectorAll(".chart-toggle button");
  btns.forEach(b => b.addEventListener("click", (e) => {
    e.stopPropagation();
    btns.forEach(x => x.classList.remove("on")); b.classList.add("on");
    loadChart(td, code, b.dataset.tf);
  }));
  loadChart(td, code, "daily");
}

async function loadChart(td, code, tf){
  const canvas = td.querySelector(".chart-canvas");
  const msg = td.querySelector(".chart-msg");
  msg.style.display = "block"; msg.textContent = "불러오는 중…"; canvas.style.display = "none";
  try {
    let candles;
    if (tf === "daily" && dailyCache[code] && dailyCache[code].length){
      candles = dailyCache[code];  // 미니차트가 받아둔 일봉 재사용
    } else {
      const res = await fetch(`/api/candles?code=${code}&tf=${tf}`);
      const data = await res.json();
      candles = data.candles || [];
      if (tf === "daily") dailyCache[code] = candles;
    }
    if (!candles.length){ msg.textContent = "차트 데이터가 없습니다."; return; }
    msg.style.display = "none"; canvas.style.display = "block";
    drawCandles(canvas, candles, tf);
  } catch { msg.textContent = "차트를 불러오지 못했습니다."; }
}

function drawCandles(canvas, candles, tf){
  const data = tf === "daily" ? candles.slice(-60) : candles;
  const dpr = window.devicePixelRatio || 1;
  const cssW = canvas.clientWidth || 600, cssH = canvas.clientHeight || 200;
  canvas.width = cssW * dpr; canvas.height = cssH * dpr;
  const ctx = canvas.getContext("2d");
  ctx.scale(dpr, dpr); ctx.clearRect(0, 0, cssW, cssH);

  const padL = 4, padR = 54, padT = 8, volH = 34, gap = 8;
  const priceH = cssH - padT - volH - gap, priceTop = padT;
  const volTop = priceTop + priceH + gap, volBot = cssH;

  let hi = -Infinity, lo = Infinity, vmax = 0;
  for (const d of data){ hi = Math.max(hi, d.h); lo = Math.min(lo, d.l); vmax = Math.max(vmax, d.v); }
  if (hi === lo){ hi += 1; lo -= 1; }
  const plotW = cssW - padL - padR, n = data.length, step = plotW / n;
  const bw = Math.max(1, Math.min(step * 0.7, 14));
  const yP = (p) => priceTop + (hi - p) / (hi - lo) * priceH;

  const upC = getCSS("--up"), downC = getCSS("--down");
  ctx.font = "10px sans-serif"; ctx.textAlign = "left";

  ctx.strokeStyle = getCSS("--border"); ctx.fillStyle = getCSS("--faint"); ctx.lineWidth = 1;
  [hi, (hi + lo) / 2, lo].forEach(p => {
    const y = yP(p);
    ctx.globalAlpha = .5; ctx.beginPath(); ctx.moveTo(padL, y); ctx.lineTo(cssW - padR, y); ctx.stroke(); ctx.globalAlpha = 1;
    ctx.fillText(Math.round(p).toLocaleString(), cssW - padR + 5, y + 3);
  });

  for (let i = 0; i < n; i++){
    const d = data[i], cx = padL + step * i + step / 2;
    const col = d.c >= d.o ? upC : downC;
    ctx.strokeStyle = col; ctx.fillStyle = col; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(cx, yP(d.h)); ctx.lineTo(cx, yP(d.l)); ctx.stroke();
    const yo = yP(d.o), yc = yP(d.c), top = Math.min(yo, yc), h = Math.max(1, Math.abs(yc - yo));
    ctx.fillRect(cx - bw / 2, top, bw, h);
    if (vmax > 0){
      const vh = (d.v / vmax) * (volBot - volTop);
      ctx.globalAlpha = .4; ctx.fillRect(cx - bw / 2, volBot - vh, bw, vh); ctx.globalAlpha = 1;
    }
  }

  const last = data[n - 1].c, ly = yP(last);
  ctx.strokeStyle = getCSS("--blue"); ctx.setLineDash([3, 3]); ctx.globalAlpha = .7;
  ctx.beginPath(); ctx.moveTo(padL, ly); ctx.lineTo(cssW - padR, ly); ctx.stroke();
  ctx.setLineDash([]); ctx.globalAlpha = 1;
  ctx.fillStyle = getCSS("--blue"); ctx.fillText(last.toLocaleString(), cssW - padR + 5, ly + 3);
}

function renderIx(it){
  if (it.value == null) return `<div class="ix"><span class="ixn">${esc(it.name)}</span><span class="ixv">—</span></div>`;
  const r = it.change_rate ?? 0, cls = r > 0 ? "chg-up" : r < 0 ? "chg-down" : "";
  const v = it.value.toLocaleString(undefined, {maximumFractionDigits:2});
  const chg = (it.change != null)
    ? `${r>0?"+":""}${it.change.toLocaleString(undefined,{maximumFractionDigits:2})} ` : "";
  return `<div class="ix">
    <span class="ixn">${esc(it.name)}</span>
    <span class="ixv">${v}</span>
    <span class="ixc ${cls}">${chg}(${r>0?"+":""}${r.toFixed(2)}%)</span>
  </div>`;
}

async function loadIndexBar(){
  const [idx, mkt] = await Promise.all([
    fetch("/api/indices").then(r=>r.json()).catch(()=>[]),
    fetch("/api/markets").then(r=>r.json()).catch(()=>[]),
  ]);
  $("indexbar").innerHTML = [...idx, ...mkt].map(renderIx).join("");
}

document.addEventListener("click", (e) => {
  if (!e.target.closest(".search-box")) $("dropdown").style.display = "none";
});
loadIndexBar();
loadPicks();
