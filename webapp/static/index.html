<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>trading-bot 종목 등록</title>
<style>
  :root {
    --bg: #0f1115;
    --panel: #171920;
    --panel-2: #1e2129;
    --hover: #262a34;
    --border: #262932;
    --text: #eaecef;
    --muted: #8b8f9b;
    --faint: #6b6f7a;
    --blue: #3182f6;
    --up: #f0616d;
    --down: #4c8dff;
    --green: #2ac1a0;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font-family: -apple-system, "Apple SD Gothic Neo", "Pretendard", "Malgun Gothic", sans-serif;
    font-size: 14px; -webkit-font-smoothing: antialiased;
  }
  header {
    padding: 14px 28px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 12px; position: sticky; top: 0;
    background: rgba(15,17,21,.85); backdrop-filter: blur(8px); z-index: 50;
  }
  header .logo { font-weight: 800; font-size: 17px; letter-spacing: -.3px; }
  header .tag { color: var(--muted); font-size: 12px; }
  header .spacer { flex: 1; }
  header .stat { color: var(--muted); font-size: 13px; }
  header .stat b { color: var(--text); }

  .wrap {
    display: grid; grid-template-columns: 300px minmax(680px,1fr) 300px; gap: 18px;
    padding: 22px 28px; max-width: 1720px; margin: 0 auto; align-items: start;
  }
  .col-left { display: flex; flex-direction: column; gap: 18px; min-width: 0; }
  .side { display: flex; flex-direction: column; gap: 18px; min-width: 0; }
  /* 중간 폭: 핵심 표를 넓히고 시장 패널은 왼쪽 등록·요약 아래로 배치 */
  @media (max-width: 1440px) {
    .wrap { grid-template-columns: 300px minmax(0,1fr); }
    .col-left { grid-column: 1; grid-row: 1; }
    .wrap > section.panel { grid-column: 2; grid-row: 1 / span 3; }
    .side { grid-column: 1; grid-row: 2; display: flex; align-items: stretch; }
  }
  @media (max-width: 900px) {
    header { padding: 12px 16px; }
    header .tag { display: none; }
    .wrap { grid-template-columns: minmax(0,1fr); width: 100%; min-width: 0; padding: 14px; gap: 14px; overflow: hidden; }
    .wrap > *, .col-left, .side { min-width: 0; max-width: 100%; }
    .col-left { display: grid; grid-template-columns: minmax(0,1fr) minmax(220px,.7fr); }
    .col-left, .wrap > section.panel, .side { grid-column: auto; grid-row: auto; }
  }

  .panel { background: var(--panel); border: 1px solid var(--border); border-radius: 16px; }
  .panel-pad { padding: 20px; }
  .panel h2 { margin: 0 0 4px; font-size: 16px; letter-spacing: -.2px; }
  .panel .sub { color: var(--faint); font-size: 12px; margin-bottom: 16px; }

  label { display: block; font-size: 12px; color: var(--muted); margin: 14px 0 7px; font-weight: 600; }
  input[type=text], input[type=password] {
    width: 100%; padding: 12px 13px; background: var(--panel-2);
    border: 1px solid var(--border); border-radius: 11px; color: var(--text); font-size: 14px;
  }
  input[type=text]::placeholder, input[type=password]::placeholder { color: var(--faint); }
  input[type=text]:focus, input[type=password]:focus { outline: none; border-color: var(--blue); background: #1b1f29; }

  .search-box { position: relative; }
  .dropdown {
    position: absolute; top: 46px; left: 0; right: 0; z-index: 30;
    background: var(--panel-2); border: 1px solid var(--border); border-radius: 12px;
    overflow: hidden; max-height: 300px; overflow-y: auto; box-shadow: 0 12px 30px rgba(0,0,0,.4);
  }
  .dd-item { width: 100%; padding: 11px 13px; cursor: pointer; display: flex; align-items: center; gap: 10px; border: 0; background: transparent; color: var(--text); text-align: left; font: inherit; }
  .dd-item:hover, .dd-item:focus-visible, .dd-item.active { background: var(--hover); outline: none; }
  .dd-item.on { background: #1b2535; }
  .dd-item .ck {
    width: 17px; height: 17px; flex: 0 0 17px; border-radius: 5px; border: 1.5px solid #3a4150;
    display: inline-flex; align-items: center; justify-content: center; font-size: 12px; color: #fff;
  }
  .dd-item.on .ck { background: var(--blue); border-color: var(--blue); }
  .dd-item .nm { font-weight: 500; flex: 1; }
  .dd-item .code { color: var(--faint); font-size: 12px; font-variant-numeric: tabular-nums; }
  .dd-foot {
    display: flex; justify-content: space-between; align-items: center; padding: 10px 13px;
    border-top: 1px solid var(--border); color: var(--muted); font-size: 12px;
    position: sticky; bottom: 0; background: var(--panel-2);
  }
  .dd-foot b { color: var(--text); }
  .dd-foot button {
    background: var(--blue); color: #fff; border: none; border-radius: 7px;
    padding: 6px 14px; font-size: 12px; font-weight: 600; cursor: pointer;
  }

  .chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; min-height: 8px; }
  .chip {
    background: #1d2735; color: #bcd2ff;
    border: 1px solid #314563; border-radius: 999px; padding: 7px 8px 7px 12px;
    font-size: 13px; display: flex; gap: 7px; align-items: center;
  }
  .chip .code { color: #7f96c2; font-size: 11px; }
  .chip button { background: none; border: none; color: #8aa3d4; cursor: pointer; font-size: 15px; line-height: 1; padding: 0; }
  .chip button:hover { color: #fff; }

  button.primary {
    width: 100%; margin-top: 18px; padding: 13px; background: var(--blue);
    color: #fff; border: none; border-radius: 12px; font-size: 15px; font-weight: 700; cursor: pointer;
    transition: filter .12s;
  }
  button.primary:hover { filter: brightness(1.08); }
  button.primary:disabled { background: #20283a; color: #5b6678; cursor: not-allowed; filter: none; }
  .msg { margin-top: 13px; font-size: 13px; min-height: 18px; }
  .msg.ok { color: var(--green); }
  .msg.err { color: var(--up); }
  .reg-settings { margin-top: 14px; border-top: 1px solid var(--border); padding-top: 10px; }
  .reg-settings summary { color: var(--muted); cursor: pointer; font-size: 12px; font-weight: 700; }
  .reg-settings[open] summary { color: var(--text); margin-bottom: 4px; }

  /* 현황 */
  .status-head { display: flex; align-items: center; justify-content: space-between; padding: 20px 20px 6px; }
  .status-head h2 { margin: 0; font-size: 16px; }
  .refresh { background: none; border: 1px solid var(--border); color: var(--muted); border-radius: 8px; padding: 6px 11px; cursor: pointer; font-size: 12px; }
  .refresh:hover { background: var(--hover); color: var(--text); }
  .status-actions { display: flex; gap: 7px; }
  .sector-filter { display: flex; gap: 7px; overflow-x: auto; padding: 10px 20px 12px; scrollbar-width: thin; }
  .filter-btn { white-space: nowrap; background: var(--panel-2); border: 1px solid var(--border); color: var(--muted); border-radius: 999px; padding: 7px 11px; cursor: pointer; font-size: 12px; }
  .filter-btn.on { color: #fff; background: var(--blue); border-color: var(--blue); }

  .sector-block { padding: 6px 8px 4px; }
  .sector-title {
    display: flex; align-items: center; gap: 9px; padding: 12px 12px 8px;
  }
  .dd-empty { padding: 16px 13px; color: var(--muted); font-size: 12px; line-height: 1.55; }
  .sector-title .name { font-weight: 700; font-size: 14px; }
  .sector-title .cnt { color: var(--faint); font-size: 12px; }
  .sector-avg { font-size: 12px; font-weight: 700; font-variant-numeric: tabular-nums; }
  .sector-toggle { background: none; border: 0; color: var(--faint); cursor: pointer; padding: 2px 4px; font-size: 11px; transition: transform .15s; }
  .sector-block.collapsed .sector-toggle { transform: rotate(-90deg); }
  .sector-block.collapsed table { display: none; }
  .sector-block.filtered-out { display: none; }

  table { width: 100%; border-collapse: collapse; }
  th { color: var(--muted); font-size: 11px; font-weight: 600; text-align: right; padding: 6px 12px; }
  th.l { text-align: left; }
  td { padding: 11px 12px; border-top: 1px solid var(--border); font-size: 14px; }
  tr.row:hover td { background: var(--panel-2); }
  td.nm { font-weight: 600; }
  .stock-meta { display: flex; align-items: center; gap: 7px; margin-top: 3px; }
  .stock-code { color: var(--faint); font-size: 11px; font-variant-numeric: tabular-nums; font-weight: 500; }
  .type-badge { display: inline-flex; border-radius: 5px; padding: 1px 5px; background: #24334c; color: #a9c7ff; font-size: 9px; font-weight: 800; letter-spacing: .2px; }
  td.code { color: var(--faint); font-size: 12px; font-variant-numeric: tabular-nums; }
  td.r { text-align: right; font-variant-numeric: tabular-nums; }
  .chg-na { color: var(--faint); }
  .chg-up { color: var(--up); font-weight: 600; }
  .chg-down { color: var(--down); font-weight: 600; }
  td.del-cell { text-align: right; width: 34px; }
  .del { background: none; border: none; color: var(--faint); cursor: pointer; font-size: 17px; line-height: 1; padding: 2px 7px; border-radius: 6px; }
  .del:hover { color: var(--up); background: #2a1e22; }
  .sector-del { margin-left: auto; background: none; border: 1px solid var(--border); color: var(--faint); border-radius: 7px; padding: 3px 10px; font-size: 11px; cursor: pointer; }
  .sector-del:hover { color: var(--up); border-color: #5a3138; }
  tr.row { cursor: pointer; }
  tr.row.open td { background: var(--panel-2); }
  td.nm .caret { color: var(--faint); font-size: 10px; margin-left: 6px; transition: transform .15s; display: inline-block; }
  tr.row.open td.nm .caret { transform: rotate(90deg); color: var(--blue); }

  tr.chart-row > td { padding: 0; border-top: none; background: var(--panel-2); }
  .chart-wrap { padding: 10px 14px 16px; }
  .chart-toggle { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .chart-toggle button {
    background: var(--panel); border: 1px solid var(--border); color: var(--muted);
    border-radius: 7px; padding: 4px 12px; font-size: 12px; cursor: pointer; font-weight: 600;
  }
  .chart-toggle button.on { background: var(--blue); border-color: var(--blue); color: #fff; }
  .chart-toggle .ct-title { margin-left: auto; color: var(--faint); font-size: 11px; font-variant-numeric: tabular-nums; }
  .chart-canvas { width: 100%; height: 200px; display: block; }
  .chart-msg { color: var(--faint); font-size: 12px; padding: 24px 0; text-align: center; }

  td.spark-cell { width: 132px; padding: 4px 12px; }
  canvas.spark { width: 120px; height: 38px; display: block; }

  .empty { color: var(--faint); padding: 48px 0; text-align: center; }
  .empty .big { font-size: 32px; margin-bottom: 10px; }

  /* 요약 */
  .sumrow { display: flex; align-items: center; gap: 10px; padding: 9px 0; }
  .sumrow .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--blue); }
  .sumrow .nm { font-size: 13px; }
  .sumrow .cnt { margin-left: auto; color: var(--muted); font-size: 13px; font-variant-numeric: tabular-nums; }
  .bar { height: 6px; background: var(--panel-2); border-radius: 4px; margin-top: 4px; overflow: hidden; }
  .bar > span { display: block; height: 100%; background: var(--blue); }
  .summary-panel h2 { font-size: 15px; margin: 0 0 14px; }
  .summary-panel .total { font-size: 28px; font-weight: 800; letter-spacing: -.5px; }
  .summary-panel .total small { font-size: 13px; color: var(--muted); font-weight: 500; margin-left: 4px; }

  /* 우측: 지수 차트 */
  .idx-head { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .idx-tabs { display: flex; gap: 6px; }
  .idx-tabs button {
    background: var(--panel-2); border: 1px solid var(--border); color: var(--muted);
    border-radius: 8px; padding: 5px 13px; font-size: 12px; font-weight: 600; cursor: pointer;
  }
  .idx-tabs button.on { background: var(--blue); border-color: var(--blue); color: #fff; }
  .idx-quote { margin-left: auto; text-align: right; }
  .idx-quote .idx-val { font-weight: 800; font-size: 17px; font-variant-numeric: tabular-nums; }
  .idx-quote .idx-chg { display: block; font-size: 12px; font-variant-numeric: tabular-nums; }
  .idx-canvas { width: 100%; height: 220px; display: block; }

  /* 우측: 시장 대시보드 — 좁은 컬럼에서 이름/숫자 겹침 방지: 카드 세로 1열 + nowrap */
  .side h2.side-h { font-size: 15px; margin: 0 0 12px; }
  .side h2.side-h .unit { color: var(--faint); font-size: 11px; font-weight: 500; margin-left: 6px; }
  .mkt-grid { display: grid; grid-template-columns: 1fr; gap: 10px; }
  .mkt-card { background: var(--panel-2); border: 1px solid var(--border); border-radius: 12px; padding: 11px 14px; min-width: 0; }
  .mkt-card .mkt-title { color: var(--muted); font-size: 12px; font-weight: 700; margin-bottom: 6px; }
  .mkt-row { display: flex; justify-content: space-between; align-items: baseline; gap: 10px; padding: 3.5px 0; font-size: 13px; }
  .mkt-row .mn { color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .mkt-row .mv { font-variant-numeric: tabular-nums; font-weight: 600; text-align: right; white-space: nowrap; flex: 0 0 auto; }
  .mkt-row .mv small { font-weight: 600; font-size: 11px; margin-left: 5px; }

  /* 우측: 수급 */
  .flow-block { padding: 10px 0; }
  .flow-block + .flow-block { border-top: 1px solid var(--border); }
  .flow-head { font-weight: 700; font-size: 13px; margin-bottom: 6px; }
  .flow-nums { display: flex; gap: 14px; font-size: 12.5px; font-variant-numeric: tabular-nums; flex-wrap: wrap; }
  .flow-nums .fl { color: var(--muted); }
  .flow-breadth { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
  .flow-breadth span {
    font-size: 11px; font-variant-numeric: tabular-nums; padding: 2px 8px;
    border-radius: 6px; background: var(--panel-2); border: 1px solid var(--border); color: var(--muted);
  }
  .flow-breadth .b-up { color: var(--up); }
  .flow-breadth .b-down { color: var(--down); }
  .flow-foot { color: var(--faint); font-size: 11px; margin-top: 10px; }

  @media (max-width: 900px) {
    .col-left { grid-template-columns: 1fr; }
    .summary-panel { display: none; }
    .status-head { padding: 16px 14px 6px; }
    .sector-filter { padding: 8px 14px 10px; }
    .side { display: grid; grid-template-columns: 1fr; }
  }

  @media (max-width: 640px) {
    body { font-size: 13px; }
    header .logo { font-size: 15px; }
    header .stat { font-size: 11px; }
    .wrap { padding: 10px; gap: 10px; }
    .panel { border-radius: 13px; }
    .panel-pad { padding: 16px; }
    .status-head { align-items: flex-start; gap: 10px; }
    .sector-filter { scrollbar-width: none; }
    .sector-filter::-webkit-scrollbar { display: none; }
    .status-actions { flex-wrap: wrap; justify-content: flex-end; }
    .refresh { padding: 6px 8px; }
    .sector-title { padding: 11px 10px; flex-wrap: wrap; }
    .sector-title .sector-del { margin-left: auto; }
    .sector-title .registered-by { display: none; }
    .sector-block { padding: 2px 6px 3px; }
    .sector-block { overflow: hidden; }
    table, tbody { display: block; width: 100%; min-width: 0; }
    table thead { display: none; }
    tr.row {
      display: grid; grid-template-columns: minmax(0,1fr) auto 30px;
      grid-template-areas: "name change delete" "price value delete";
      column-gap: 10px; row-gap: 5px; align-items: center;
      padding: 12px 8px; border-top: 1px solid var(--border);
      width: 100%; min-width: 0;
    }
    tr.row:hover td, tr.row.open td { background: transparent; }
    tr.row td { border: 0; padding: 0; min-width: 0; }
    td.nm { grid-area: name; font-size: 14px; }
    td.price { grid-area: price; color: var(--muted); font-size: 12px; text-align: left; }
    td.value { grid-area: value; color: var(--faint); font-size: 11px; text-align: right; }
    td.change { grid-area: change; font-size: 14px; white-space: nowrap; }
    td.del-cell { grid-area: delete; align-self: stretch; display: flex; align-items: center; justify-content: flex-end; }
    td.spark-cell, td.volume { display: none; }
    .stock-meta { margin-top: 2px; }
    tr.chart-row { display: block; width: 100%; }
    tr.chart-row[style*="display:none"] { display: none; }
    tr.chart-row > td { display: block; width: 100%; }
    .chart-wrap { padding: 8px 8px 14px; }
    .chart-canvas { height: 180px; }
    .idx-canvas { height: 190px; }
    .mkt-grid { gap: 8px; }
  }
</style>
</head>
<body>
  <header>
    <span class="logo">📈 trading-bot</span>
    <span class="tag">종목 등록 · 로컬 전용</span>
    <span class="spacer"></span>
    <span class="stat">등록 <b id="hcount">0</b>종목 · <b id="hsectors">0</b>섹터</span>
  </header>

  <div class="wrap">
    <!-- 좌측: 등록 + 요약 -->
    <div class="col-left">
      <section class="panel panel-pad">
        <h2>종목 등록</h2>
        <div class="sub">섹터를 정하고 종목을 검색해 추가하세요</div>

        <label for="sector">섹터명</label>
        <input type="text" id="sector" placeholder="예: 반도체, 2차전지, 조선" />

        <label for="search">종목 검색 (주식·ETF 한글명 / 코드)</label>
        <div class="search-box">
          <input type="text" id="search" placeholder="삼성전자, 005930 …" autocomplete="off"
                 role="combobox" aria-autocomplete="list" aria-controls="dropdown" aria-expanded="false" />
          <div class="dropdown" id="dropdown" role="listbox" style="display:none"></div>
        </div>

        <div class="chips" id="chips"></div>

        <details class="reg-settings" id="regSettings">
          <summary>등록 설정 · 등록자 / 공유 비밀번호</summary>
          <label for="author">등록자</label>
          <input type="text" id="author" placeholder="이름" maxlength="20" />

          <label for="webkey">공유 비밀번호</label>
          <input type="password" id="webkey" placeholder="공유 비밀번호 (영문·숫자)" autocomplete="current-password" />
        </details>

        <button class="primary" id="submit" disabled>등록</button>
        <div class="msg" id="msg"></div>
      </section>

      <section class="panel panel-pad summary-panel">
        <h2>요약</h2>
        <div class="total"><span id="stotal">0</span><small>종목</small></div>
        <div id="sectorbars" style="margin-top:16px"></div>
      </section>
    </div>

    <!-- 가운데: 현황 -->
    <section class="panel">
      <div class="status-head">
        <h2>등록 현황</h2>
        <div class="status-actions">
          <button class="refresh" id="collapseAll">모두 접기</button>
          <button class="refresh" id="refresh">↻ 새로고침</button>
        </div>
      </div>
      <nav class="sector-filter" id="sectorFilter" aria-label="섹터 필터"></nav>
      <div id="picks"></div>
    </section>

    <!-- 우측: 지수 차트 + 시장 + 수급 -->
    <aside class="side">
      <section class="panel panel-pad">
        <div class="idx-head">
          <div class="idx-tabs" id="idxtabs">
            <button class="on" data-idx="0001">코스피</button>
            <button data-idx="1001">코스닥</button>
          </div>
          <div class="idx-quote">
            <span class="idx-val" id="idxval">—</span>
            <span class="idx-chg chg-na" id="idxchg"></span>
          </div>
        </div>
        <canvas class="idx-canvas" id="idxcanvas"></canvas>
        <div class="chart-msg" id="idxmsg" style="display:none"></div>
      </section>

      <section class="panel panel-pad">
        <h2 class="side-h">시장</h2>
        <div class="mkt-grid" id="mktgrid"><div class="chart-msg">불러오는 중…</div></div>
      </section>

      <section class="panel panel-pad">
        <h2 class="side-h">수급 <span class="unit">억원 · 순매수</span></h2>
        <div id="flowbox"><div class="chart-msg">불러오는 중…</div></div>
      </section>
    </aside>
  </div>

<script>
const $ = (id) => document.getElementById(id);
let selected = [];
let searchTimer = null;

// 등록자·공유 비밀번호는 기기별로 기억 (localStorage 차단 브라우저에서도 죽지 않게 보호)
function lsGet(k){ try { return localStorage.getItem(k); } catch { return null; } }
function lsSet(k,v){ try { localStorage.setItem(k,v); } catch {} }
$("author").value = lsGet("web_author") || "황파파";
$("webkey").value = lsGet("web_key") || "";
function authHeaders(){
  lsSet("web_author", $("author").value.trim());
  lsSet("web_key", $("webkey").value.trim());
  return {"Content-Type":"application/json", "X-Web-Key": $("webkey").value.trim()};
}
// 브라우저는 한글 등 비ASCII 헤더값을 전송하지 못한다 — fetch가 알 수 없는 오류를
// 던지기 전에 여기서 사람이 읽을 메시지로 막는다.
function keyProblem(){
  const k = $("webkey").value.trim();
  if (!k) return "공유 비밀번호를 입력하세요";
  if (!/^[\x21-\x7e]+$/.test(k)) return "공유 비밀번호는 영문·숫자만 입력할 수 있습니다";
  return null;
}
// FastAPI 422 응답의 detail은 객체 배열 — 그대로 표시하면 [object Object]가 된다
function errDetail(d, fallback){
  if (Array.isArray(d)) return d.map(e => e.msg || JSON.stringify(e)).join(", ");
  return d || fallback;
}
const SECTOR_COLORS = ["#3182f6","#2ac1a0","#f0616d","#f5a623","#9b6cf0","#19b6c9","#e8639b"];
let colorBySector = {};

// 등락 부호 → 색상 클래스 / 부호 포함 표기 (표·배지·지수·카드·수급 공용)
function chgClass(v){ return v > 0 ? "chg-up" : v < 0 ? "chg-down" : "chg-na"; }
function fmtSigned(v, digits){
  const s = digits != null ? v.toFixed(digits) : v.toLocaleString();
  return (v > 0 ? "+" : "") + s;
}

function renderChips() {
  $("chips").innerHTML = selected.map((s, i) =>
    `<span class="chip">${s.type === "etf" ? '<span class="type-badge">ETF</span>' : ''}${esc(s.name)} <span class="code">${s.code}</span>
       <button onclick="removeChip(${i})">×</button></span>`).join("");
  updateSubmit();
}
function removeChip(i){
  selected.splice(i,1); renderChips();
  if ($("dropdown").style.display === "block") renderDropdown();
}
function updateSubmit(){ $("submit").disabled = !($("sector").value.trim() && selected.length); }
function esc(s){ return (s||"").replace(/[<>&'"]/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;',"'":'&#39;','"':'&quot;'}[c])); }

$("sector").addEventListener("input", updateSubmit);
$("search").addEventListener("input", (e) => {
  const q = e.target.value.trim();
  clearTimeout(searchTimer);
  lastResults = [];
  lastQuery = q;
  activeResultIndex = -1;
  if (!q){ closeDropdown(); return; }
  $("dropdown").innerHTML = `<div class="dd-empty">검색 중…</div>`;
  $("dropdown").style.display = "block";
  $("search").setAttribute("aria-expanded", "true");
  $("search").removeAttribute("aria-activedescendant");
  searchTimer = setTimeout(() => doSearch(q), 160);
});

$("search").addEventListener("keydown", (e) => {
  if (e.key === "Escape") { closeDropdown(); return; }
  if (!lastResults.length || !["ArrowDown", "ArrowUp", "Enter"].includes(e.key)) return;
  if (e.key === "Enter") {
    if (activeResultIndex < 0) return;
    e.preventDefault();
    toggleSelect(lastResults[activeResultIndex].code);
    return;
  }
  e.preventDefault();
  const delta = e.key === "ArrowDown" ? 1 : -1;
  activeResultIndex = (activeResultIndex + delta + lastResults.length) % lastResults.length;
  renderDropdown();
  document.getElementById(`search-option-${lastResults[activeResultIndex].code}`)?.scrollIntoView({block: "nearest"});
});

let lastResults = [];
let lastQuery = "";
let activeResultIndex = -1;
async function doSearch(q){
  try {
    const res = await fetch(`/api/search?q=${encodeURIComponent(q)}&limit=10`);
    if (!res.ok) throw new Error(`검색 실패 (${res.status})`);
    const results = await res.json();
    if (!Array.isArray(results)) throw new Error("검색 응답 형식 오류");
    if ($("search").value.trim() !== q) return;  // 늦게 도착한 이전 검색 응답 무시
    lastResults = results;
    lastQuery = q;
    renderDropdown();
  } catch {
    if ($("search").value.trim() !== q) return;
    lastResults = [];
    activeResultIndex = -1;
    $("dropdown").innerHTML = `<div class="dd-empty">검색 서버에 연결하지 못했습니다. 잠시 후 다시 시도하세요.</div>`;
    $("dropdown").style.display = "block";
    $("search").setAttribute("aria-expanded", "true");
    $("search").removeAttribute("aria-activedescendant");
  }
}
function renderDropdown(){
  if (!lastResults.length){
    $("dropdown").innerHTML = `<div class="dd-empty"><b>${esc(lastQuery)}</b> 검색 결과가 없습니다.<br>ETF는 종목명 또는 6자리 영숫자 코드를 확인해 주세요.</div>`;
    $("dropdown").style.display="block";
    $("search").setAttribute("aria-expanded", "true");
    $("search").removeAttribute("aria-activedescendant");
    return;
  }
  const rows = lastResults.map((it, index) => {
    const on = selected.some(s => s.code === it.code);
    return `<button type="button" id="search-option-${it.code}" role="option" aria-selected="${on}"
      class="dd-item${on?' on':''}${activeResultIndex === index ? ' active' : ''}" data-code="${it.code}">
      <span class="ck">${on?'✓':''}</span>
      <span class="nm">${it.type === "etf" ? '<span class="type-badge">ETF</span> ' : ''}${esc(it.name)}</span><span class="code">${it.code}</span></button>`;
  }).join("");
  $("dropdown").innerHTML = rows +
    `<div class="dd-foot"><span>선택 <b>${selected.length}</b>개</span>
       <button type="button" onclick="closeDropdown()">완료</button></div>`;
  $("dropdown").style.display = "block";
  $("search").setAttribute("aria-expanded", "true");
  if (activeResultIndex >= 0) $("search").setAttribute("aria-activedescendant", `search-option-${lastResults[activeResultIndex].code}`);
  else $("search").removeAttribute("aria-activedescendant");
}
function toggleSelect(code){
  const i = selected.findIndex(s => s.code === code);
  const hit = lastResults.find(s => s.code === code);
  if (i >= 0) selected.splice(i, 1); else if (hit) selected.push({ code, name: hit.name, type: hit.type || "stock" });
  renderChips();
  renderDropdown();
}
function closeDropdown(){
  $("dropdown").style.display = "none";
  activeResultIndex = -1;
  $("search").setAttribute("aria-expanded", "false");
  $("search").removeAttribute("aria-activedescendant");
}

$("submit").addEventListener("click", async () => {
  const sector = $("sector").value.trim();
  if (!sector || !selected.length) return;
  const kp = keyProblem();
  if (kp){ $("regSettings").open = true; $("msg").className = "msg err"; $("msg").textContent = "❌ " + kp; return; }
  $("submit").disabled = true;
  $("msg").className = "msg"; $("msg").textContent = "등록 중…";
  try {
    const res = await fetch("/api/picks", {
      method: "POST", headers: authHeaders(),
      body: JSON.stringify({
        sector_name: sector, stocks: selected,
        author: $("author").value.trim(),
      }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(errDetail(data.detail, "등록 실패"));
    $("msg").className = "msg ok";
    $("msg").textContent = `✅ [${sector}] ${data.added}종목 등록 (총 ${data.total}` +
      (data.skipped.length ? `, 중복 ${data.skipped.length}` : "") + ")";
    selected = []; renderChips();
    loadPicks();
  } catch (err) {
    $("msg").className = "msg err"; $("msg").textContent = "❌ " + err.message;
  } finally { updateSubmit(); }
});

async function removeStock(sector, code){
  if (!confirm(`${code} 을(를) [${sector}]에서 제거할까요?`)) return;
  const kp = keyProblem();
  if (kp){ alert("❌ " + kp); return; }
  try {
    const res = await fetch("/api/picks/remove-stock", {
      method: "POST", headers: authHeaders(),
      body: JSON.stringify({ sector_name: sector, stock_code: code }),
    });
    if (!res.ok) { const d = await res.json(); throw new Error(errDetail(d.detail, "제거 실패")); }
    loadPicks();
  } catch (e) { alert("❌ " + e.message); }
}

async function removeSector(sector){
  if (!confirm(`[${sector}] 섹터 전체를 제거할까요? (소속 종목 모두 삭제)`)) return;
  const kp = keyProblem();
  if (kp){ alert("❌ " + kp); return; }
  try {
    const res = await fetch("/api/picks/remove-sector", {
      method: "POST", headers: authHeaders(),
      body: JSON.stringify({ sector_name: sector }),
    });
    if (!res.ok) { const d = await res.json(); throw new Error(errDetail(d.detail, "제거 실패")); }
    loadPicks();
  } catch (e) { alert("❌ " + e.message); }
}

let allCodes = [];   // 현재 등록된 전 종목 코드 (시세 갱신용)
let activeSector = null;  // null = 전체 보기 (실제 섹터명과 충돌하지 않음)
const collapsedSectors = new Set();
let mobileCollapseInitialized = false;

function renderSectorFilters(sectors){
  if (!sectors.length){
    activeSector = null;
    $("sectorFilter").innerHTML = "";
    return;
  }
  if (activeSector !== null && !sectors.includes(activeSector)) activeSector = null;
  const allButton = `<button class="filter-btn${activeSector === null ? ' on' : ''}" data-filter-all="true">전체 ${sectors.length}</button>`;
  const sectorButtons = sectors.map(sec =>
    `<button class="filter-btn${activeSector === sec ? ' on' : ''}" data-filter-id="${encodeURIComponent(sec)}">${esc(sec)}</button>`
  ).join("");
  $("sectorFilter").innerHTML = allButton + sectorButtons;
}

function selectSector(sec){
  activeSector = sec;
  document.querySelectorAll(".filter-btn").forEach(b => {
    const buttonSector = b.hasAttribute("data-filter-all") ? null : decodeURIComponent(b.dataset.filterId);
    b.classList.toggle("on", buttonSector === sec);
  });
  document.querySelectorAll(".sector-block").forEach(block => {
    block.classList.toggle("filtered-out", sec !== null && block.dataset.sector !== sec);
  });
  setupMiniChartObserver();
}

function toggleSector(sec){
  if (collapsedSectors.has(sec)) collapsedSectors.delete(sec); else collapsedSectors.add(sec);
  const block = [...document.querySelectorAll(".sector-block")].find(b => b.dataset.sector === sec);
  if (!block) return;
  block.classList.toggle("collapsed", collapsedSectors.has(sec));
  const button = block.querySelector(".sector-toggle");
  if (button) button.setAttribute("aria-expanded", String(!collapsedSectors.has(sec)));
  setupMiniChartObserver();
}

function toggleAllSectors(){
  const blocks = [...document.querySelectorAll(".sector-block:not(.filtered-out)")];
  const collapse = blocks.some(b => !collapsedSectors.has(b.dataset.sector));
  blocks.forEach(block => {
    if (collapse) collapsedSectors.add(block.dataset.sector); else collapsedSectors.delete(block.dataset.sector);
    block.classList.toggle("collapsed", collapse);
    const button = block.querySelector(".sector-toggle");
    if (button) button.setAttribute("aria-expanded", String(!collapse));
  });
  $("collapseAll").textContent = collapse ? "모두 펼치기" : "모두 접기";
  setupMiniChartObserver();
}

$("picks").addEventListener("click", (e) => {

  if (action){
    e.stopPropagation();
    const sec = decodeURIComponent(action.dataset.sectorId || "");
    if (action.dataset.action === "toggle-sector") toggleSector(sec);

    if (action.dataset.action === "remove-stock") removeStock(sec, action.dataset.code);

  const row = e.target.closest("tr.row[data-code]");

async function loadPicks(){
  try {
    const res = await fetch("/api/picks");
    const picks = await res.json();
    // sector → [{name,code,pick_id,expires}]
    const bySector = {};
    const sectorBy = {};
    let total = 0;
    for (const p of picks) for (const s of p.stocks) {
      (bySector[s.sector] = bySector[s.sector] || []).push({...s, pick_id: p.pick_id, expires: p.expires_at.slice(0,10)});
      if (p.registered_by && !sectorBy[s.sector]) sectorBy[s.sector] = p.registered_by;
      total++;
    }
    const sectors = Object.keys(bySector);
    $("hcount").textContent = total;
    $("hsectors").textContent = sectors.length;
    $("stotal").textContent = total;

    if (!total) {
      allCodes = [];  // 빈 상태에서 이전 코드로 시세 폴링이 계속되지 않게
      renderSectorFilters([]);
      if (miniObserver) miniObserver.disconnect();
      visibleMiniCanvases.clear();
      $("picks").innerHTML = `<div class="empty"><div class="big">🗂️</div>아직 등록된 종목이 없습니다.<br>왼쪽에서 섹터와 종목을 추가해보세요.</div>`;
      $("sectorbars").innerHTML = `<div style="color:var(--faint);font-size:13px">—</div>`;
      return;
    }

    colorBySector = {};
    sectors.forEach((sec, si) => { colorBySector[sec] = SECTOR_COLORS[si % SECTOR_COLORS.length]; });
    if (innerWidth <= 640 && !mobileCollapseInitialized){
      sectors.slice(1).forEach(sec => collapsedSectors.add(sec));
      mobileCollapseInitialized = true;
    }

    $("picks").innerHTML = sectors.map((sec) => {
      const items = bySector[sec];
      const rows = items.map((s) => `
        <tr class="row" data-code="${s.code}" data-name-id="${encodeURIComponent(s.name)}">
          <td class="nm">${esc(s.name)}<span class="caret">▶</span>
            <span class="stock-meta">${s.type === "etf" ? '<span class="type-badge">ETF</span>' : ''}<span class="stock-code">${s.code}</span></span>
          </td>
          <td class="r price" data-q="price-${s.code}">—</td>
          <td class="r value" data-q="value-${s.code}">—</td>
          <td class="r chg-na change" data-chg="${s.code}">—</td>
          <td class="spark-cell"><canvas class="spark" data-spark="${s.code}"></canvas></td>
          <td class="del-cell"><button class="del" data-action="remove-stock" data-sector-id="${encodeURIComponent(sec)}" data-code="${s.code}" title="${esc(s.name)} 제거" aria-label="${esc(s.name)} 제거">×</button></td>
        </tr>
        <tr class="chart-row" style="display:none"><td colspan="6"></td></tr>`).join("");
      return `
        <div class="sector-block${collapsedSectors.has(sec) ? ' collapsed' : ''}" data-sector="${esc(sec)}">
          <div class="sector-title">
            <button class="sector-toggle" data-action="toggle-sector" data-sector-id="${encodeURIComponent(sec)}" aria-label="${esc(sec)} 접기 또는 펼치기" aria-expanded="${!collapsedSectors.has(sec)}">▼</button>
            <span class="dot" style="width:9px;height:9px;border-radius:50%;background:${colorBySector[sec]}"></span>
            <span class="name">${esc(sec)}</span>
            <span class="cnt">${items.length}종목</span>
            <span class="sector-avg"></span>
            ${sectorBy[sec] ? `<span class="cnt registered-by">등록: ${esc(sectorBy[sec])}</span>` : ""}
            <button class="sector-del" data-action="remove-sector" data-sector-id="${encodeURIComponent(sec)}">섹터 삭제</button>
          </div>
          <table>
            <thead><tr>
              <th class="l">종목</th><th>현재가</th><th>거래대금</th><th>등락률</th><th class="l">차트</th><th></th>
            </tr></thead>
            <tbody>${rows}</tbody>

    }).join("");

    renderSummary();
    renderSectorFilters(sectors);
    selectSector(activeSector);

    allCodes = [...new Set(picks.flatMap(p => p.stocks.map(s => s.code)))];
    await refreshQuotes();
  } catch {
    $("picks").innerHTML = `<div class="empty">현황을 불러오지 못했습니다.</div>`;

// 섹터 요약 막대 — 현황의 현재 DOM 순서(=강한 섹터순)를 따라간다
function renderSummary(){
  const blocks = [...document.querySelectorAll("#picks .sector-block")];
  const total = blocks.reduce((a, b) => a + b.querySelectorAll("tr.row").length, 0);
  if (!blocks.length || !total) return;
  $("sectorbars").innerHTML = blocks.map(b => {
    const sec = b.dataset.sector;
    const cnt = b.querySelectorAll("tr.row").length;
    const pct = Math.round(cnt / total * 100);
    const color = colorBySector[sec] || SECTOR_COLORS[0];
    return `<div>
      <div class="sumrow"><span class="dot" style="background:${color}"></span>
        <span class="nm">${esc(sec)}</span><span class="cnt">${cnt}</span></div>
      <div class="bar"><span style="width:${pct}%;background:${color}"></span></div>
    </div>`;
  }).join("");
}

function fmtPrice(p){ return p ? p.toLocaleString()+"원" : "—"; }
function fmtValue(v){ return v ? Math.round(v/1e8).toLocaleString()+"억" : "—"; }
function setCell(sel, text){ document.querySelectorAll(sel).forEach(el => el.textContent = text); }

let quotesInFlight = false;  // KIS 응답이 느릴 때 60초 타이머가 요청을 쌓지 않게

async function refreshQuotes(){
  if (!allCodes.length || quotesInFlight) return;
  quotesInFlight = true;
  try {
    // 서버 한도(100종목)에 맞춰 청크 — 초과 종목이 조용히 잘리지 않게
    const quotes = {};
    for (let i = 0; i < allCodes.length; i += 100){
      const chunk = allCodes.slice(i, i + 100);
      const res = await fetch(`/api/quotes?codes=${chunk.join(",")}`);
      Object.assign(quotes, await res.json());
    }
    allCodes.forEach(code => {
      const q = quotes[code];
      document.querySelectorAll(`td[data-chg="${code}"]`).forEach(el => {
        el.classList.remove("chg-na","chg-up","chg-down");
        if (!q) { el.textContent = "—"; el.classList.add("chg-na"); return; }
        el.textContent = fmtSigned(q.change_rate, 2) + "%";
        el.classList.add(chgClass(q.change_rate));
      });
      setCell(`td[data-q="price-${code}"]`, q ? fmtPrice(q.price) : "—");
      setCell(`td[data-q="value-${code}"]`, q ? fmtValue(q.value) : "—");
    });
    applySort(quotes);
  } catch {} finally { quotesInFlight = false; }
}

// 시세 도착 후 정렬 — 섹터는 구성종목 등락률 평균이 높은 순, 섹터 안은 등락률 높은 순.
// DOM 노드를 통째로 이동시키므로 이미 그린 캔버스와 펼쳐진 차트가 그대로 유지된다.
function applySort(quotes){
  const container = $("picks");
  const blocks = [...container.querySelectorAll(".sector-block")];
  if (!blocks.length) return;
  const rateOf = (code) => {
    const q = quotes[code];
    return q && typeof q.change_rate === "number" ? q.change_rate : null;
  };

  const avgOf = new Map();  // block -> 평균 등락률 (시세 없으면 null)
  blocks.forEach(block => {
    const codes = [...block.querySelectorAll("tr.row")].map(r => r.dataset.code);
    const rates = codes.map(rateOf).filter(v => v !== null);
    const avg = rates.length ? rates.reduce((a, x) => a + x, 0) / rates.length : null;
    avgOf.set(block, avg);
    const badge = block.querySelector(".sector-avg");
    if (badge){
      badge.classList.remove("chg-up","chg-down","chg-na");
      badge.textContent = avg === null ? "" : "평균 " + fmtSigned(avg, 2) + "%";
      if (avg !== null) badge.classList.add(chgClass(avg));
    }
    // 섹터 내 종목 정렬 — (종목행, 차트행) 쌍 단위로 이동
    const tbody = block.querySelector("tbody");
    const rows = [...tbody.children];
    const pairs = [];
    for (let i = 0; i < rows.length; i += 2) pairs.push([rows[i], rows[i+1]]);
    pairs.sort((a, b) => {
      const ra = rateOf(a[0].dataset.code), rb = rateOf(b[0].dataset.code);
      return (rb === null ? -1e9 : rb) - (ra === null ? -1e9 : ra);
    });
    pairs.forEach((p, i) => {
      const rankCell = p[0].querySelector("td.rank");
      if (rankCell) rankCell.textContent = i + 1;
      tbody.append(p[0]);
      if (p[1]) tbody.append(p[1]);
    });
  });

  blocks.sort((a, b) => (avgOf.get(b) ?? -1e9) - (avgOf.get(a) ?? -1e9));
  blocks.forEach(b => container.append(b));
  renderSummary();
}

function getCSS(v){ return getComputedStyle(document.documentElement).getPropertyValue(v).trim() || "#888"; }

let dailyCache = {};  // code -> 일봉 candles (미니/펼침 차트 공용)
let miniObserver = null;
const visibleMiniCanvases = new Set();
const miniQueue = new Set();
let miniQueueTimer = null;

function setupMiniChartObserver(){
  if (miniObserver) miniObserver.disconnect();
  visibleMiniCanvases.clear();
  const canvases = [...document.querySelectorAll(
    ".sector-block:not(.collapsed):not(.filtered-out) canvas.spark"
  )];
  if (!("IntersectionObserver" in window)){
    const missing = [];
    canvases.forEach(canvas => {
      const code = canvas.dataset.spark;
      if (!code) return;
      if (dailyCache[code]?.length) drawMini(canvas, dailyCache[code]);
      else if (!dailyCache[code]) missing.push(code);
    });
    loadMiniCharts(missing);
    return;
  }
  miniObserver = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      const code = entry.target.dataset.spark;
      if (!code) return;
      if (entry.isIntersecting){
        visibleMiniCanvases.add(entry.target);
        if (dailyCache[code]) {
          if (dailyCache[code].length) drawMini(entry.target, dailyCache[code]);
        } else {
          queueMiniChart(code);
        }
      } else {
        visibleMiniCanvases.delete(entry.target);
      }
    });
  }, {rootMargin: "180px 0px"});
  canvases.forEach(canvas => miniObserver.observe(canvas));
}

function queueMiniChart(code){
  miniQueue.add(code);
  clearTimeout(miniQueueTimer);
  miniQueueTimer = setTimeout(() => {
    const codes = [...miniQueue]; miniQueue.clear(); loadMiniCharts(codes);
  }, 80);
}

// 행별 가로 미니 일봉차트
async function loadMiniCharts(codes, force=false){
  codes = [...new Set(codes)].filter(code => force || !dailyCache[code]);
  if (!codes.length) return;
  try {
    const res = await fetch(`/api/candles-batch?codes=${codes.join(",")}&tf=daily`);
    const data = await res.json();
    const map = data.candles || {};
    codes.forEach(code => {
      dailyCache[code] = map[code] || [];
      document.querySelectorAll(`canvas.spark[data-spark="${code}"]`).forEach(cv => {
        if (dailyCache[code].length) drawMini(cv, dailyCache[code]);
      });
    });
  } catch {}
}

// 최신 일봉 1개를 가로로 누인 캔들: 꼬리(저가~고가) 선 + 시가~종가 각진 몸통
function drawMini(canvas, candles){
  if (!candles.length) return;
  const d = candles[candles.length - 1];
  const dpr = window.devicePixelRatio || 1;
  const cssW = canvas.clientWidth || 120, cssH = canvas.clientHeight || 38;
  canvas.width = cssW * dpr; canvas.height = cssH * dpr;
  const ctx = canvas.getContext("2d"); ctx.scale(dpr, dpr); ctx.clearRect(0, 0, cssW, cssH);

  const pad = 4, lo = d.l, range = (d.h - d.l) || 1;
  const x = (p) => pad + (p - lo) / range * (cssW - pad * 2);
  const cy = Math.round(cssH / 2) + 0.5;  // 0.5 보정으로 선 또렷하게
  const col = d.c >= d.o ? getCSS("--up") : getCSS("--down");

  // 꼬리: 저가~고가 가는 선 (몸통 밖으로 양끝 노출)
  ctx.strokeStyle = col; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(x(d.l), cy); ctx.lineTo(x(d.h), cy); ctx.stroke();

  // 몸통: 시가~종가 각진 사각형
  const bx1 = x(Math.min(d.o, d.c)), bx2 = x(Math.max(d.o, d.c));
  ctx.fillStyle = col;
  ctx.fillRect(Math.round(bx1), cy - 7, Math.max(Math.round(bx2 - bx1), 2), 14);
}

// 행 클릭 → 상세 차트 펼침

function toggleChart(rowEl, code, name){
  const chartRow = rowEl.nextElementSibling;
  if (!chartRow || !chartRow.classList.contains("chart-row")) return;
  if (chartRow.style.display !== "none"){
    chartRow.style.display = "none"; rowEl.classList.remove("open"); return;
  }
  rowEl.classList.add("open");
  chartRow.style.display = "";
  const td = chartRow.firstElementChild;
  if (td.dataset.built) return;
  td.dataset.built = "1";
  td.innerHTML = `
    <div class="chart-wrap">
      <div class="chart-toggle">
        <button class="on" data-tf="daily">일봉</button>
        <button data-tf="minute">분봉</button>
        <span class="ct-title">${esc(name)} · ${code}</span>
      </div>
      <canvas class="chart-canvas"></canvas>
      <div class="chart-msg" style="display:none"></div>
    </div>`;
  const btns = td.querySelectorAll(".chart-toggle button");
  btns.forEach(b => b.addEventListener("click", (e) => {
    e.stopPropagation();
    btns.forEach(x => x.classList.remove("on")); b.classList.add("on");
    loadChart(td, code, b.dataset.tf);
  }));
  loadChart(td, code, "daily");
}

async function loadChart(td, code, tf){
  const canvas = td.querySelector(".chart-canvas");
  const msg = td.querySelector(".chart-msg");
  msg.style.display = "block"; msg.textContent = "불러오는 중…"; canvas.style.display = "none";
  try {
    let candles;
    if (tf === "daily" && dailyCache[code] && dailyCache[code].length){
      candles = dailyCache[code];  // 미니차트가 받아둔 일봉 재사용
    } else {
      const res = await fetch(`/api/candles?code=${code}&tf=${tf}`);
      const data = await res.json();
      candles = data.candles || [];
      if (tf === "daily") dailyCache[code] = candles;
    }
    if (!candles.length){ msg.textContent = "차트 데이터가 없습니다."; return; }
    msg.style.display = "none"; canvas.style.display = "block";
    drawCandles(canvas, candles, tf);
  } catch { msg.textContent = "차트를 불러오지 못했습니다."; }
}

function drawCandles(canvas, candles, tf){
  const data = tf === "daily" ? candles.slice(-60) : candles;
  const dpr = window.devicePixelRatio || 1;
  const cssW = canvas.clientWidth || 600, cssH = canvas.clientHeight || 200;
  canvas.width = cssW * dpr; canvas.height = cssH * dpr;
  const ctx = canvas.getContext("2d");
  ctx.scale(dpr, dpr); ctx.clearRect(0, 0, cssW, cssH);

  const padL = 4, padR = 54, padT = 8, volH = 34, gap = 8;
  const priceH = cssH - padT - volH - gap, priceTop = padT;
  const volTop = priceTop + priceH + gap, volBot = cssH;

  let hi = -Infinity, lo = Infinity, vmax = 0;
  for (const d of data){ hi = Math.max(hi, d.h); lo = Math.min(lo, d.l); vmax = Math.max(vmax, d.v); }
  if (hi === lo){ hi += 1; lo -= 1; }
  const plotW = cssW - padL - padR, n = data.length, step = plotW / n;
  const bw = Math.max(1, Math.min(step * 0.7, 14));
  const yP = (p) => priceTop + (hi - p) / (hi - lo) * priceH;

  const upC = getCSS("--up"), downC = getCSS("--down");
  ctx.font = "10px sans-serif"; ctx.textAlign = "left";

  ctx.strokeStyle = getCSS("--border"); ctx.fillStyle = getCSS("--faint"); ctx.lineWidth = 1;
  [hi, (hi + lo) / 2, lo].forEach(p => {
    const y = yP(p);
    ctx.globalAlpha = .5; ctx.beginPath(); ctx.moveTo(padL, y); ctx.lineTo(cssW - padR, y); ctx.stroke(); ctx.globalAlpha = 1;
    ctx.fillText(Math.round(p).toLocaleString(), cssW - padR + 5, y + 3);
  });

  for (let i = 0; i < n; i++){
    const d = data[i], cx = padL + step * i + step / 2;
    const col = d.c >= d.o ? upC : downC;
    ctx.strokeStyle = col; ctx.fillStyle = col; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(cx, yP(d.h)); ctx.lineTo(cx, yP(d.l)); ctx.stroke();
    const yo = yP(d.o), yc = yP(d.c), top = Math.min(yo, yc), h = Math.max(1, Math.abs(yc - yo));
    ctx.fillRect(cx - bw / 2, top, bw, h);
    if (vmax > 0){
      const vh = (d.v / vmax) * (volBot - volTop);
      ctx.globalAlpha = .4; ctx.fillRect(cx - bw / 2, volBot - vh, bw, vh); ctx.globalAlpha = 1;
    }
  }

  const last = data[n - 1].c, ly = yP(last);
  ctx.strokeStyle = getCSS("--blue"); ctx.setLineDash([3, 3]); ctx.globalAlpha = .7;
  ctx.beginPath(); ctx.moveTo(padL, ly); ctx.lineTo(cssW - padR, ly); ctx.stroke();
  ctx.setLineDash([]); ctx.globalAlpha = 1;
  ctx.fillStyle = getCSS("--blue"); ctx.fillText(last.toLocaleString(), cssW - padR + 5, ly + 3);
}

// ----- 우측: 지수 선차트 -----
let idxCode = "0001";
$("idxtabs").querySelectorAll("button").forEach(b => b.addEventListener("click", () => {
  $("idxtabs").querySelectorAll("button").forEach(x => x.classList.remove("on"));
  b.classList.add("on");
  idxCode = b.dataset.idx;
  loadIndexChart();
}));

// 당일(로컬 기준) YYYYMMDD — 지수차트가 직전 거래일 데이터일 때 날짜 라벨용
function todayYmd(){
  const d = new Date();
  return `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,"0")}${String(d.getDate()).padStart(2,"0")}`;
}

async function loadIndexChart(){
  const canvas = $("idxcanvas"), msg = $("idxmsg");
  const wanted = idxCode;  // 탭 전환 레이스 가드 — 늦게 온 이전 탭 응답 무시
  try {
    const res = await fetch(`/api/index-chart?code=${wanted}`);
    const data = await res.json();
    if (wanted !== idxCode) return;
    const valEl = $("idxval"), chgEl = $("idxchg");
    if (data.value != null){
      valEl.textContent = data.value.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
      const r = data.change_rate ?? 0;
      // 프리장 등 당일 봉이 아직 없으면 직전 거래일 차트 — 날짜를 명시해 오독 방지
      const stale = (data.date && data.date !== todayYmd())
        ? ` · ${data.date.slice(4,6)}/${data.date.slice(6,8)}` : "";
      chgEl.textContent = `${fmtSigned(data.change ?? 0)} (${fmtSigned(r, 2)}%)${stale}`;
      chgEl.classList.remove("chg-up","chg-down","chg-na");
      chgEl.classList.add(chgClass(r));
    } else { valEl.textContent = "—"; chgEl.textContent = ""; }
    if (!data.bars || !data.bars.length){
      canvas.style.display = "none"; msg.style.display = "block";
      msg.textContent = "지수 차트 데이터가 없습니다.";
      return;
    }
    canvas.style.display = "block"; msg.style.display = "none";
    drawIndexLine(canvas, data);
  } catch {
    if (wanted !== idxCode) return;
    canvas.style.display = "none"; msg.style.display = "block";
    msg.textContent = "지수 차트를 불러오지 못했습니다.";
  }
}

function drawIndexLine(canvas, data){
  const bars = data.bars;
  const dpr = window.devicePixelRatio || 1;
  const cssW = canvas.clientWidth || 340, cssH = canvas.clientHeight || 220;
  canvas.width = cssW * dpr; canvas.height = cssH * dpr;
  const ctx = canvas.getContext("2d");
  ctx.scale(dpr, dpr); ctx.clearRect(0, 0, cssW, cssH);

  const padL = 4, padR = 56, padT = 10, padB = 18;
  const plotW = cssW - padL - padR, plotH = cssH - padT - padB;

  let hi = -Infinity, lo = Infinity;
  for (const b of bars){ hi = Math.max(hi, b.c); lo = Math.min(lo, b.c); }
  if (data.prev_close != null){ hi = Math.max(hi, data.prev_close); lo = Math.min(lo, data.prev_close); }
  if (hi === lo){ hi += 1; lo -= 1; }
  const span = hi - lo; hi += span * .06; lo -= span * .06;
  const x = (i) => padL + (bars.length === 1 ? plotW / 2 : i / (bars.length - 1) * plotW);
  const y = (p) => padT + (hi - p) / (hi - lo) * plotH;

  ctx.font = "10px sans-serif"; ctx.textAlign = "left";
  ctx.strokeStyle = getCSS("--border"); ctx.fillStyle = getCSS("--faint"); ctx.lineWidth = 1;
  [hi, (hi + lo) / 2, lo].forEach(p => {
    const yy = y(p);
    ctx.globalAlpha = .5; ctx.beginPath(); ctx.moveTo(padL, yy); ctx.lineTo(cssW - padR, yy); ctx.stroke(); ctx.globalAlpha = 1;
    ctx.fillText(Math.round(p).toLocaleString(), cssW - padR + 5, yy + 3);
  });

  // 전일 종가 기준선
  if (data.prev_close != null){
    const py = y(data.prev_close);
    ctx.strokeStyle = getCSS("--faint"); ctx.setLineDash([3, 3]); ctx.globalAlpha = .6;
    ctx.beginPath(); ctx.moveTo(padL, py); ctx.lineTo(cssW - padR, py); ctx.stroke();
    ctx.setLineDash([]); ctx.globalAlpha = 1;
  }

  const col = getCSS((data.change ?? 0) >= 0 ? "--up" : "--down");

  // 경로는 한 번만 구성 — 본선(stroke)과 아래 채움(fill)이 같은 기하를 공유
  const line = new Path2D();
  bars.forEach((b, i) => { i ? line.lineTo(x(i), y(b.c)) : line.moveTo(x(i), y(b.c)); });
  const area = new Path2D(line);
  area.lineTo(x(bars.length - 1), padT + plotH); area.lineTo(x(0), padT + plotH); area.closePath();
  ctx.fillStyle = col; ctx.globalAlpha = .08; ctx.fill(area); ctx.globalAlpha = 1;
  ctx.strokeStyle = col; ctx.lineWidth = 1.6; ctx.stroke(line);

  // 현재가 라벨
  const last = bars[bars.length - 1].c;
  ctx.fillStyle = col;
  ctx.fillText(last.toLocaleString(undefined, {maximumFractionDigits: 2}), cssW - padR + 5, y(last) + 3);

  // 시간 라벨 — 정시 봉만
  ctx.fillStyle = getCSS("--faint"); ctx.textAlign = "center";
  bars.forEach((b, i) => {
    const t = b.t || "";
    if (t.length >= 4 && t.slice(2, 4) === "00"){
      ctx.fillText(`${t.slice(0, 2)}:00`, x(i), cssH - 4);
    }
  });
  ctx.textAlign = "left";
}

// ----- 우측: 시장 대시보드 + 수급 -----
// unit 힌트는 서버 _YAHOO 정의가 내려준다 (이름 문자열 매칭 금지 — 심볼 추가 시 자동 반영)
function fmtMkt(unit, v){
  if (v == null) return "—";
  if (unit === "usd") return "$" + v.toFixed(2);
  if (unit === "krw") return v.toLocaleString(undefined, {minimumFractionDigits: 1, maximumFractionDigits: 1});
  return v.toLocaleString(undefined, {maximumFractionDigits: 2});
}
function mktRow(name, value, rate, unit){
  const pct = (rate == null) ? "" : `<small>${fmtSigned(rate, 2)}%</small>`;
  return `<div class="mkt-row"><span class="mn">${esc(name)}</span>
    <span class="mv ${chgClass(rate)}">${fmtMkt(unit, value)}${pct}</span></div>`;
}
function mktCard(title, rows){
  return `<div class="mkt-card"><div class="mkt-title">${esc(title)}</div>${rows.join("")}</div>`;
}

function flowCell(label, v){
  if (v == null) return `<span class="fl">${label} —</span>`;
  return `<span><span class="fl">${label}</span> <b class="${chgClass(v)}">${fmtSigned(v)}</b></span>`;
}
function breadthChips(ix){
  if (!ix || ix.up == null) return "";
  return `<div class="flow-breadth">
    <span class="b-up">↑${ix.upper ?? 0}</span>
    <span class="b-up">▲${ix.up.toLocaleString()}</span>
    <span>—${ix.flat ?? 0}</span>
    <span class="b-down">▼${(ix.down ?? 0).toLocaleString()}</span>
    <span class="b-down">↓${ix.lower ?? 0}</span>
  </div>`;
}

async function loadDashboard(){
  const [idxRaw, mktRaw, flwRaw] = await Promise.all([
    fetch("/api/indices").then(r => r.json()).catch(() => []),
    fetch("/api/markets").then(r => r.json()).catch(() => []),
    fetch("/api/flows").then(r => r.json()).catch(() => ({})),
  ]);
  // 오류 응답이 JSON 객체(detail 등)로 와도 패널이 통째로 죽지 않게 형태 방어
  const idx = Array.isArray(idxRaw) ? idxRaw : [];
  const mkt = Array.isArray(mktRaw) ? mktRaw : [];
  const flw = (flwRaw && typeof flwRaw === "object" && !Array.isArray(flwRaw)) ? flwRaw : {};

  const groupRows = (g) => mkt.filter(m => m.group === g)
    .map(m => mktRow(m.name, m.value, m.change_rate, m.unit));
  const domesticRows = idx.map(i => mktRow(i.name, i.value, i.change_rate));

  $("mktgrid").innerHTML =
    mktCard("국내장", domesticRows.length ? domesticRows : [mktRow("코스피", null, null)]) +
    mktCard("미국 선물", groupRows("us_futures")) +
    mktCard("미국장", groupRows("us")) +
    mktCard("환율 · 유가", groupRows("fx"));

  const ixByCode = {};  // 표시명이 아니라 지수 코드로 조인 — 이름 변경에 안전
  idx.forEach(i => { if (i.code) ixByCode[i.code] = i; });
  const block = (title, f, ix) => `
    <div class="flow-block">
      <div class="flow-head">${title}</div>
      <div class="flow-nums">
        ${flowCell("개인", f ? f.individual : null)}
        ${flowCell("외국인", f ? f.foreign : null)}
        ${flowCell("기관", f ? f.institution : null)}
      </div>
      ${breadthChips(ix)}
    </div>`;
  $("flowbox").innerHTML =
    block("KOSPI", flw.kospi, ixByCode["0001"]) +
    block("KOSDAQ", flw.kosdaq, ixByCode["1001"]) +
    `<div class="flow-foot">↑상한 ▲상승 —보합 ▼하락 ↓하한 · 60초마다 갱신</div>`;
}

document.addEventListener("click", (e) => {
  if (!e.target.closest(".search-box")) closeDropdown();
});

// 우측 패널 일괄 갱신 — 초기 로드 / 새로고침 버튼 / 60초 타이머가 공유
function refreshSide(){ loadIndexChart(); loadDashboard(); }

loadPicks();
refreshSide();
// 시세·지수·대시보드 60초 갱신, 행별 미니 일봉차트는 5분마다 (오늘 봉이 장중에 변하므로)
let tick = 0;
setInterval(() => {
  tick++;
  refreshQuotes();
  refreshSide();
  if (tick % 5 === 0) {
    const visibleCodes = [...visibleMiniCanvases].map(canvas => canvas.dataset.spark).filter(Boolean);
    loadMiniCharts(visibleCodes, true);
  }
}, 60000);
</script>
